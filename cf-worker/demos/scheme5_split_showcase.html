<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方案五：双栏左右分割现代应用官网风格</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1.5rem;
    }
    .layout {
      width: 100%;
      max-width: 960px;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 3rem;
      align-items: center;
    }
    .left-panel h1 {
      font-size: 2.75rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #0f172a 0%, #334155 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .left-panel p {
      font-size: 1.05rem;
      color: #64748b;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .feature-list {
      list-style: none;
      font-size: 0.9rem;
      color: #334155;
    }
    .feature-list li {
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .feature-list li::before {
      content: "";
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #2563eb;
      border-radius: 50%;
    }
    .right-card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 2rem;
    }
    .card-head {
      margin-bottom: 1.5rem;
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .card-sub {
      font-size: 0.85rem;
      color: #64748b;
    }
    .btn-main {
      display: block;
      width: 100%;
      background: #2563eb;
      color: #ffffff;
      font-weight: 600;
      font-size: 0.95rem;
      text-align: center;
      padding: 0.875rem;
      border-radius: 10px;
      text-decoration: none;
      margin-bottom: 0.75rem;
    }
    .btn-sec {
      display: block;
      width: 100%;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      color: #334155;
      font-weight: 600;
      font-size: 0.875rem;
      text-align: center;
      padding: 0.75rem;
      border-radius: 10px;
      text-decoration: none;
    }
    @media (max-width: 768px) {
      .layout {
        grid-template-columns: 1fr;
        gap: 2rem;
      }
      .left-panel h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="left-panel">
      <h1>OpenAI Codex<br>官方安装包获取</h1>
      <p>为您提供实时同步的 Microsoft Store 官方离线安装包 MSIX 直链解析与 Cloudflare 边缘代理加速下载。</p>
      <ul class="feature-list">
        <li>自动匹配语义化最新版本与 x64 架构</li>
        <li>支持微软 CDN 302 直链跳转与中转代理下载</li>
        <li>包含完整 SHA-1 安全哈希校验</li>
      </ul>
    </div>
    <div class="right-card">
      <div class="card-head">
        <div class="card-title">Codex Release 1.0.23.0</div>
        <div class="card-sub">文件大小: 123.45 MB · 格式: MSIX</div>
      </div>
      <a href="#" class="btn-main">中转代理下载</a>
      <a href="#" class="btn-sec">复制 CDN 原始直链</a>
    </div>
  </div>
</body>
</html>
