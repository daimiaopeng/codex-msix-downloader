<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方案一改动 A：Vercel 高对比黑白极简风格</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      color: #000000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      line-height: 1.5;
    }
    .container {
      max-width: 480px;
      width: 100%;
    }
    .top-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      font-weight: 500;
      color: #666666;
      border: 1px solid #eaeaea;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      margin-bottom: 1.75rem;
    }
    .dot {
      width: 6px;
      height: 6px;
      background: #10b981;
      border-radius: 50%;
    }
    h1 {
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 0.5rem;
      color: #000000;
    }
    .desc {
      font-size: 0.95rem;
      color: #666666;
      margin-bottom: 2rem;
    }
    .btn-black {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      background: #000000;
      color: #ffffff;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.875rem 1.25rem;
      border-radius: 10px;
      text-decoration: none;
      margin-bottom: 0.75rem;
      transition: opacity 0.2s ease;
    }
    .btn-black:hover {
      opacity: 0.85;
    }
    .btn-outline {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      background: #ffffff;
      color: #000000;
      border: 1px solid #e5e5e5;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.875rem 1.25rem;
      border-radius: 10px;
      text-decoration: none;
      margin-bottom: 2rem;
      transition: background 0.2s ease;
    }
    .btn-outline:hover {
      background: #f5f5f5;
    }
    .meta-footer {
      border-top: 1px solid #f0f0f0;
      padding-top: 1.25rem;
      font-size: 0.8rem;
      color: #888888;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-badge">
      <span class="dot"></span>
      OpenAI Codex v1.0.23.0 · x64
    </div>

    <h1>官方安装包下载</h1>
    <p class="desc">实时同步微软应用商店 CDN 直链，支持高速代理中转。</p>

    <a href="#" class="btn-black">代理流式下载 (123.45 MB)</a>
    <a href="#" class="btn-outline">复制 CDN 原始直链</a>

    <div class="meta-footer">
      <div>文件校验: SHA-1 已验证</div>
      <div>支持系统: Windows 10/11</div>
    </div>
  </div>
</body>
</html>
