<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户参考图 1:1 精确还原 Demo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #ffffff;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      line-height: 1.5;
    }
    .wrapper {
      max-width: 1040px;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3.5rem;
      align-items: center;
    }

    /* 左侧文字与按钮区 */
    .left-section {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .tag-blue {
      color: #2563eb;
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
    }
    .main-title {
      font-size: 4.25rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      color: #0f172a;
      margin-bottom: 1.25rem;
    }
    .sub-title {
      font-size: 1.15rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 2.25rem;
      max-width: 440px;
    }
    .action-group {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      font-size: 0.925rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s ease;
    }
    .btn svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }
    .btn-blue {
      background: #2563eb;
      color: #ffffff;
    }
    .btn-blue:hover {
      background: #1d4ed8;
    }
    .btn-white {
      background: #ffffff;
      color: #0f172a;
      border-color: #cbd5e1;
    }
    .btn-white:hover {
      background: #f8fafc;
      border-color: #94a3b8;
    }
    .btn-text {
      background: transparent;
      color: #64748b;
      padding: 0.75rem 0.5rem;
    }
    .btn-text:hover {
      color: #0f172a;
    }

    /* 右侧卡片区 */
    .right-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 2.25rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .label-blue {
      color: #2563eb;
      font-size: 0.875rem;
      font-weight: 600;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #dcfce7;
      color: #15803d;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      background: #16a34a;
      border-radius: 50%;
    }
    .version-display {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #0f172a;
      margin-bottom: 1rem;
    }
    .filename-box {
      background: #f8fafc;
      border-radius: 8px;
      padding: 0.65rem 0.875rem;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 0.8rem;
      color: #334155;
      word-break: break-all;
      margin-bottom: 1.5rem;
    }
    .grid-2x2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.875rem;
      margin-bottom: 1.5rem;
    }
    .grid-box {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 0.875rem 1rem;
      background: #ffffff;
    }
    .box-label {
      font-size: 0.75rem;
      color: #64748b;
      margin-bottom: 0.35rem;
    }
    .box-val {
      font-size: 0.95rem;
      font-weight: 700;
      color: #0f172a;
    }
    .divider {
      height: 1px;
      background: #e2e8f0;
      margin-bottom: 1.25rem;
    }
    .sha-title {
      color: #16a34a;
      font-size: 0.875rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }
    .sha-val {
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 0.775rem;
      color: #64748b;
      word-break: break-all;
    }

    /* 自适应手机端响应式 */
    @media (max-width: 868px) {
      body {
        padding: 1.5rem 1rem;
      }
      .wrapper {
        grid-template-columns: 1fr;
        gap: 2.5rem;
      }
      .main-title {
        font-size: 3rem;
      }
      .sub-title {
        font-size: 1rem;
        margin-bottom: 1.5rem;
      }
      .action-group {
        width: 100%;
        flex-direction: column;
        align-items: stretch;
      }
      .btn {
        justify-content: center;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <!-- 左侧区域 -->
    <div class="left-section">

        </button>
        <a href="#" class="btn btn-text">
          <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>

    </div>

    <!-- 右侧卡片区 -->
    <div class="right-card">
      <div class="card-top">

        <div class="status-badge">
          <span class="status-dot"></span>
          可下载
        </div>
      </div>

      <div class="version-display">26.715.10079.0</div>
      <div class="filename-box">OpenAI.Codex_26.715.10079.0_x64__2p2nqsd0c76g0.msix</div>

      <div class="grid-2x2">
        <div class="grid-box">
          <div class="box-label">架构</div>
          <div class="box-val">x64</div>
        </div>
        <div class="grid-box">
          <div class="box-label">格式</div>
          <div class="box-val">MSIX</div>
        </div>
        <div class="grid-box">
          <div class="box-label">大小</div>
          <div class="box-val">701.05 MB</div>
        </div>
        <div class="grid-box">
          <div class="box-label">有效期</div>
          <div class="box-val">2026-07-23 06:24:10 GMT</div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="sha-title">SHA1 已验证</div>
      <div class="sha-val">2270232320c342d2e192137d48b5872d066be3ab</div>
    </div>
  </div>
</body>
</html>
