<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>业界主流参照二：Node.js 官方式卡片与命令行</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .container {
      max-width: 600px;
      width: 100%;
    }
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .sub {
      color: #666;
      font-size: 0.95rem;
    }
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .opt-card {
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
      background: #fafafa;
    }
    .opt-card.highlight {
      border-color: #000000;
      background: #ffffff;
    }
    .opt-title {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .opt-desc {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 1.25rem;
    }
    .btn-action {
      display: block;
      width: 100%;
      padding: 0.65rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      text-decoration: none;
      text-align: center;
    }
    .btn-dark {
      background: #000000;
      color: #ffffff;
    }
    .btn-light {
      background: #ffffff;
      color: #000000;
      border: 1px solid #ccc;
    }
    .cmd-section {
      background: #f4f4f5;
      border-radius: 8px;
      padding: 1rem;
      font-family: monospace;
      font-size: 0.8rem;
      color: #333;
    }
    .cmd-title {
      font-weight: 600;
      color: #666;
      margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>OpenAI Codex 下载</h1>
      <p class="sub">请选择适合您的下载或安装方式</p>
    </div>

    <div class="options-grid">
      <div class="opt-card highlight">
        <div class="opt-title">中转代理下载</div>
        <div class="opt-desc">推荐 · 100% 弹出浏览器下载保存框</div>
        <a href="#" class="btn-action btn-dark">直接下载 MSIX</a>
      </div>

      <div class="opt-card">
        <div class="opt-title">微软 CDN 直链</div>
        <div class="opt-desc">302 跳转 · 适合第三方下载器</div>
        <a href="#" class="btn-action btn-light">跳转直链下载</a>
      </div>
    </div>

    <div class="cmd-section">
      <div class="cmd-title">PowerShell 命令行一键拉取</div>
      <div>Invoke-WebRequest -Uri "https://..." -OutFile "OpenAI.Codex.msix"</div>
    </div>
  </div>
</body>
</html>
