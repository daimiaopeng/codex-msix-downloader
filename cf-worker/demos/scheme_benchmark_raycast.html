<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>业界主流参照一：Raycast 风格 Hero 极简大牌感</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      text-align: center;
    }
    .hero {
      max-width: 560px;
      width: 100%;
    }
    .logo-box {
      width: 64px;
      height: 64px;
      background: #0f172a;
      border-radius: 16px;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-weight: 800;
      font-size: 1.25rem;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 0.75rem;
      color: #0f172a;
    }
    .subtitle {
      font-size: 1.1rem;
      color: #64748b;
      margin-bottom: 2.25rem;
      line-height: 1.5;
    }
    .btn-hero {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      background: #2563eb;
      color: #ffffff;
      font-size: 1.05rem;
      font-weight: 700;
      padding: 1.125rem 2rem;
      border-radius: 14px;
      text-decoration: none;
      box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.3);
      transition: transform 0.2s ease, background 0.2s ease;
      margin-bottom: 0.875rem;
    }
    .btn-hero:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }
    .sub-note {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 2.5rem;
    }
    .links-row {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      font-size: 0.875rem;
      border-top: 1px solid #f1f5f9;
      padding-top: 1.5rem;
    }
    .links-row a {
      color: #64748b;
      text-decoration: none;
      font-weight: 500;
    }
    .links-row a:hover {
      color: #0f172a;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="logo-box">Codex</div>
    <h1>OpenAI Codex for Windows</h1>
    <p class="subtitle">实时同步 Microsoft Store 官方最新离线安装包</p>

    <a href="#" class="btn-hero">下载 Windows 版安装包 (x64)</a>
    <div class="sub-note">版本 1.0.23.0 · MSIX 格式 · 123.45 MB</div>

    <div class="links-row">
      <a href="#">复制微软 CDN 直链</a>
      <a href="#">查看 JSON API</a>
      <a href="#">PowerShell 命令</a>
    </div>
  </div>
</body>
</html>
