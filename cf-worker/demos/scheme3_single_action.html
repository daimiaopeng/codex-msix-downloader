<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方案三：单按钮单页聚焦风格</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #fafafa;
      color: #171717;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }
    .card {
      width: 100%;
      max-width: 440px;
      background: #ffffff;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
      text-align: center;
    }
    .app-icon {
      width: 64px;
      height: 64px;
      background: #171717;
      color: #ffffff;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
      font-size: 1.5rem;
      font-weight: 700;
    }
    h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .meta {
      font-size: 0.875rem;
      color: #737373;
      margin-bottom: 2rem;
    }
    .download-btn {
      display: block;
      width: 100%;
      background: #2563eb;
      color: #ffffff;
      font-weight: 600;
      font-size: 1rem;
      padding: 0.875rem 1rem;
      border-radius: 10px;
      text-decoration: none;
      transition: background 0.2s ease;
      margin-bottom: 1.25rem;
    }
    .download-btn:hover {
      background: #1d4ed8;
    }
    details {
      text-align: left;
      font-size: 0.8rem;
      color: #737373;
    }
    summary {
      cursor: pointer;
      text-align: center;
      user-select: none;
      padding: 0.5rem;
    }
    .detail-content {
      background: #f5f5f5;
      padding: 0.75rem;
      border-radius: 8px;
      margin-top: 0.5rem;
      word-break: break-all;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="app-icon">Codex</div>
    <h2>OpenAI Codex</h2>
    <div class="meta">版本 1.0.23.0 · x64 · 123.45 MB</div>

    <a href="#" class="download-btn">一键下载安装包</a>

    <details>
      <summary>查看详细校验参数与命令行</summary>
      <div class="detail-content">
        文件名: OpenAI.Codex_1.0.23.0_x64.msix<br><br>
        SHA1: a1b2c3d4e5f67890123456789abcdef012345678<br><br>
        PowerShell:<br>
        Invoke-WebRequest -Uri "https://..." -OutFile "OpenAI.Codex.msix"
      </div>
    </details>
  </div>
</body>
</html>
